<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Settings - ChattyQwen</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <a href="/" class="btn btn-icon" title="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <h1 class="nav-title">Settings</h1>
    </div>
  </nav>

  <main class="main">
    <!-- Device Info -->
    <div class="card">
      <h2 class="card-title">Device Information</h2>
      <div class="settings-grid" id="device-info">
        <div class="setting-row">
          <span class="setting-label">Loading...</span>
        </div>
      </div>
    </div>

    <!-- Model Manager -->
    <div class="card">
      <h2 class="card-title">Models</h2>
      <p class="card-desc">Download and manage TTS models. Select a model to load it.</p>
      <div id="models-list" class="models-list">
        <div class="setting-row"><span class="setting-label">Loading...</span></div>
      </div>
    </div>

    <!-- Updates -->
    <div class="card">
      <h2 class="card-title">Updates</h2>
      <div class="update-section">
        <div id="update-status" class="update-status">
          <span>Click to check for updates</span>
        </div>
        <div class="update-actions">
          <button id="check-updates-btn" class="btn btn-secondary">Check for Updates</button>
          <button id="apply-update-btn" class="btn btn-primary" style="display:none">Update Now</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script type="module" src="/static/js/settings.js"></script>
</body>
</html>
