<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ChattyQwen</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <h1 class="nav-title">ChattyQwen</h1>
    </div>
    <div class="nav-right">
      <select id="model-select" class="form-select model-select">
        <option value="">Loading models...</option>
      </select>
      <a href="/settings" class="btn btn-icon" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </a>
    </div>
  </nav>

  <main class="main">
    <div class="tabs" id="mode-tabs">
      <button class="tab active" data-mode="custom_voice">Custom Voice</button>
      <button class="tab" data-mode="voice_clone">Voice Clone</button>
      <button class="tab" data-mode="voice_design">Voice Design</button>
    </div>

    <div class="card generate-card">
      <div class="form-group">
        <label for="text-input">Text to speak</label>
        <textarea id="text-input" class="form-textarea" rows="4" placeholder="Enter the text you want to convert to speech..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="language-select">Language</label>
          <select id="language-select" class="form-select">
            <option value="Auto">Auto Detect</option>
            <option value="Chinese">Chinese</option>
            <option value="English">English</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Italian">Italian</option>
            <option value="Portuguese">Portuguese</option>
            <option value="Spanish">Spanish</option>
            <option value="Russian">Russian</option>
          </select>
        </div>
      </div>

      <!-- Custom Voice controls -->
      <div id="custom-voice-controls" class="mode-controls">
        <div class="form-row">
          <div class="form-group">
            <label for="speaker-select">Speaker</label>
            <select id="speaker-select" class="form-select">
              <option value="">Select model first</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="instruct-input">Instruction <span class="label-hint">(emotion, tone, style)</span></label>
          <input id="instruct-input" class="form-input" type="text" placeholder="e.g. Speak with a warm, cheerful tone">
        </div>
      </div>

      <!-- Voice Clone controls -->
      <div id="voice-clone-controls" class="mode-controls" style="display:none">
        <div class="form-group">
          <label>Reference Audio</label>
          <div class="ref-source-toggle">
            <button class="ref-source-btn active" data-source="upload">Upload</button>
            <button class="ref-source-btn" data-source="record">Record</button>
          </div>

          <!-- Upload source -->
          <div id="ref-upload-container" class="ref-source-container">
            <div class="file-upload" id="file-upload-zone">
              <input id="ref-audio-input" type="file" accept="audio/*" class="file-input">
              <div class="file-upload-label">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>Upload reference audio file</span>
              </div>
              <div class="file-name" id="ref-audio-name"></div>
            </div>
          </div>

          <!-- Record source -->
          <div id="ref-record-container" class="ref-source-container" style="display:none">
            <div id="mic-https-warning" class="mic-warning" style="display:none">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              Microphone requires HTTPS or localhost
            </div>
            <div class="record-controls">
              <button id="record-btn" class="record-btn" title="Start recording">
                <svg class="record-icon-mic" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                <svg class="record-icon-stop" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
              </button>
              <div class="recording-status" id="recording-status">
                <span class="recording-label">Ready to record</span>
                <span class="recording-timer" id="recording-timer"></span>
              </div>
            </div>
            <div id="recording-preview" class="recording-preview" style="display:none">
              <audio id="recording-playback" controls class="recording-playback"></audio>
              <button id="discard-recording-btn" class="btn btn-sm btn-secondary" title="Discard recording">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="ref-text-input">Reference Text <span class="label-hint">(transcript of reference audio, optional)</span></label>
          <textarea id="ref-text-input" class="form-textarea" rows="2" placeholder="What the speaker says in the reference audio..."></textarea>
        </div>
      </div>

      <!-- Voice Design controls -->
      <div id="voice-design-controls" class="mode-controls" style="display:none">
        <div class="form-group">
          <label for="design-instruct-input">Voice Description</label>
          <textarea id="design-instruct-input" class="form-textarea" rows="3" placeholder="Describe the voice: e.g. Young female voice, warm and gentle, slightly breathy with a calm demeanor..."></textarea>
        </div>
      </div>

      <button id="generate-btn" class="btn btn-primary btn-generate">
        <span class="btn-text">Generate Speech</span>
        <span class="btn-loading" style="display:none">
          <span class="spinner"></span> Generating...
        </span>
      </button>
    </div>

    <!-- Audio Player -->
    <div id="audio-result" class="card audio-card" style="display:none">
      <div class="audio-header">
        <h3>Generated Audio</h3>
        <button id="download-btn" class="btn btn-secondary btn-sm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>
      <audio id="audio-player" controls class="audio-player"></audio>
    </div>

    <!-- Error display -->
    <div id="error-display" class="card error-card" style="display:none">
      <p id="error-message"></p>
    </div>
  </main>

  <div id="toast-container"></div>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
